name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.25.4'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set build variables
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          mkdir -p dist

          build_fn_hcl_tools() {
            ldflags="-s -w -X main.Version=${{ steps.vars.outputs.version }} -X main.Commit=${{ steps.vars.outputs.commit }} -X main.BuildDate=${{ steps.vars.outputs.date }}"
            platforms=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64")
            for platform in "${platforms[@]}"; do
              os="${platform%/*}"
              arch="${platform#*/}"
              binary="fn-hcl-tools"
              [ "$os" = "windows" ] && binary="${binary}.exe"
              echo "Building fn-hcl-tools ${os}/${arch}..."
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath -ldflags="$ldflags" -C function-hcl -o "../dist/${binary}" ./cmd/fn-hcl-tools
              shasum -a 256 "dist/${binary}" > "dist/${binary}.sha256"
              tar czf "dist/fn-hcl-tools-${os}-${arch}.tar.gz" -C dist "${binary}" "${binary}.sha256"
              rm "dist/${binary}" "dist/${binary}.sha256"
            done
          }

          build_function_hcl_ls() {
            platforms=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64")
            for platform in "${platforms[@]}"; do
              os="${platform%/*}"
              arch="${platform#*/}"
              binary="function-hcl-ls"
              [ "$os" = "windows" ] && binary="${binary}.exe"
              echo "Building function-hcl-ls ${os}/${arch}..."
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath -C function-hcl-ls -o "../dist/${binary}" .
              shasum -a 256 "dist/${binary}" > "dist/${binary}.sha256"
              tar czf "dist/function-hcl-ls-${os}-${arch}.tar.gz" -C dist "${binary}" "${binary}.sha256"
              rm "dist/${binary}" "dist/${binary}.sha256"
            done
          }

          build_fn_hcl_tools &
          PID1=$!
          build_function_hcl_ls &
          PID2=$!
          wait $PID1 || exit 1
          wait $PID2 || exit 1

      - name: Create archive checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  vscode-package:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: vscode
        run: npm ci --ignore-scripts

      - name: Pin language server version
        run: echo "${GITHUB_REF_NAME#v}" > vscode/language-server-version.txt

      - name: Set extension version from tag
        working-directory: vscode
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version

      - name: Package extension
        working-directory: vscode
        run: |
          npx @vscode/vsce package
          version=${GITHUB_REF_NAME#v}
          mv function-hcl-${version}.vsix function-hcl-vscode-${version}.vsix

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode/*.vsix
          retention-days: 7

  jetbrains-package:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        working-directory: jetbrains
        run: |
          ./gradlew buildPlugin -PpluginVersion=${GITHUB_REF_NAME#v} -PlanguageServerVersion=${GITHUB_REF_NAME#v}
          version=${GITHUB_REF_NAME#v}
          mv build/distributions/function-hcl-${version}.zip build/distributions/function-hcl-jetbrains-${version}.zip

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: jetbrains/build/distributions/*.zip
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs:
      - build
      - vscode-package
      - jetbrains-package
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: vsix/

      - name: Download JetBrains plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: jetbrains-plugin
          path: jetbrains-plugins/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            vsix/*.vsix
            jetbrains-plugins/*.zip

  vscode-publish:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: vsix/

      - name: Publish to VS Code Marketplace
        run: |
          for vsix in vsix/*.vsix; do
            echo "Publishing ${vsix}..."
            npx @vscode/vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  jetbrains-publish:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish plugin to JetBrains Marketplace
        working-directory: jetbrains
        run: ./gradlew publishPlugin --no-configuration-cache -PpluginVersion=${GITHUB_REF_NAME#v} -PlanguageServerVersion=${GITHUB_REF_NAME#v}
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
