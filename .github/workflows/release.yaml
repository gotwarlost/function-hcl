name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.25.4'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set build variables
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build fn-hcl-tools binaries
        working-directory: function-hcl
        run: |
          ldflags="-s -w -X main.Version=${{ steps.vars.outputs.version }} -X main.Commit=${{ steps.vars.outputs.commit }} -X main.BuildDate=${{ steps.vars.outputs.date }}"
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            binary="fn-hcl-tools"
            if [ "$os" = "windows" ]; then
              binary="${binary}.exe"
            fi
            echo "Building ${os}/${arch}..."
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath -ldflags="$ldflags" -o "../dist/${binary}" ./cmd/fn-hcl-tools
            chmod +x "../dist/${binary}"
            cd ../dist
            shasum -a 256 "${binary}" > checksums.txt
            tar czf "fn-hcl-tools-${os}-${arch}.tar.gz" "${binary}" checksums.txt
            rm "${binary}" checksums.txt
            cd ../function-hcl
          done

      - name: Build function-hcl-ls binaries
        working-directory: function-hcl-ls
        run: |
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            binary="function-hcl-ls"
            if [ "$os" = "windows" ]; then
              binary="${binary}.exe"
            fi
            echo "Building ${os}/${arch}..."
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath -o "../dist/${binary}" .
            chmod +x "../dist/${binary}"
            cd ../dist
            shasum -a 256 "${binary}" > checksums.txt
            tar czf "function-hcl-ls-${os}-${arch}.tar.gz" "${binary}" checksums.txt
            rm "${binary}" checksums.txt
            cd ../function-hcl-ls
          done

      - name: Create archive checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  vscode-package:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - vscode_target: darwin-arm64
            ls_tarball: function-hcl-ls-darwin-arm64.tar.gz
          - vscode_target: darwin-x64
            ls_tarball: function-hcl-ls-darwin-amd64.tar.gz
          - vscode_target: linux-arm64
            ls_tarball: function-hcl-ls-linux-arm64.tar.gz
          - vscode_target: linux-x64
            ls_tarball: function-hcl-ls-linux-amd64.tar.gz
          - vscode_target: win32-x64
            ls_tarball: function-hcl-ls-windows-amd64.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install dependencies
        working-directory: vscode
        run: npm ci --ignore-scripts

      - name: Extract language server binary
        working-directory: vscode
        run: node build/downloadServer.mjs --target ${{ matrix.vscode_target }} --local-tarball ../dist/${{ matrix.ls_tarball }}

      - name: Build extension
        working-directory: vscode
        run: node esbuild.js --production

      - name: Package extension
        working-directory: vscode
        run: npx vsce package --target ${{ matrix.vscode_target }}

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vscode_target }}
          path: vscode/*.vsix
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs:
      - build
      - vscode-package
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download all vsix artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          path: vsix/
          merge-multiple: true

      - name: Publish to VS Code Marketplace
        run: |
          for vsix in vsix/*.vsix; do
            echo "Publishing ${vsix}..."
            npx @vscode/vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            vsix/*.vsix
