baseURL = "https://crossplane-contrib.github.io/function-hcl/"
title = "function-hcl"
contentDir = "content/en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableMissingTranslationPlaceholders = true
enableRobotsTXT = true
enableGitInfo = true

[taxonomies]
tag = "tags"
category = "categories"

[params]
copyright = "The function-hcl Authors"
privacy_policy = ""
description = "Write Crossplane compositions in HCL — with deferred rendering, locals, expressions, and a familiar Terraform-like syntax."

# Latest released version tag. Updated automatically by the release workflow.
latest_version = "v0.2.0-rc7"

# Social preview image used for OG/Twitter cards.
images = ["images/social-preview.png"]

# Menu title if your navbar has a versions selector to access old versions of your site.
# This menu appears only if you have at least one [params.versions] set.
version_menu = "Releases"

# Flag used in the "version-banner" partial to decide whether to display a
# temporary banner on every page indicating that this is an archived version of the docs.
# Set this flag to "true" if you want to display the banner.
archived_version = false

# The version number for the version of the docs represented in this doc set.
# Used in the "version-banner" partial to display a version number for this doc set.
version = "0.1"

# A link and title for a version of the docs that is considered current.
url_latest_version = "v0.2.0-rc7"

# Repository configuration (used to create edit links and issue links)
github_repo = "https://github.com/crossplane-contrib/function-hcl"
github_project_repo = "https://github.com/crossplane-contrib/function-hcl"

# Specify a value here if your content directory is not in your repo's root directory
github_subdir = "docs-site"

# Uncomment this if you have a newer GitHub repos with "main" as the default branch,
# or specify a new value if you want to reference another branch in your docs
github_branch = "main"

# Google Custom Search Engine ID. Remove or comment out to disable search.
# gcs_engine_id = "d72aa9b2712488cc3"

# Enable Algolia DocSearch
algolia_docsearch = false

# Enable Lunr.js offline search
offlineSearch = true

# Enable syntax highlighting and copy buttons on code blocks with Prism
prism_syntax_highlighting = true

# User interface configuration
[params.ui]
# Enable to show the side bar menu in its compact state.
sidebar_menu_compact = false
# Set to true to disable breadcrumb navigation.
breadcrumb_disable = false
# Set to true to hide the sidebar search box (the top nav search box will still be displayed if search is enabled)
sidebar_search_disable = false
# Set to false if you don't want to display a logo (/assets/icons/logo.svg) in the top nav bar
navbar_logo = true
# Set to true to disable the About link in the site footer
footer_about_disable = false

# Adds a H2 section titled "Feedback" to the bottom of each doc. The responses are sent to Google Analytics as events.
# This feature depends on [services.googleAnalytics] being set, since it is using the default GA property.
[params.ui.feedback]
enable = false
yes = 'Glad to hear it! Please <a href="https://github.com/crossplane-contrib/function-hcl/issues/new">tell us how we can improve</a>.'
no = 'Sorry to hear that. Please <a href="https://github.com/crossplane-contrib/function-hcl/issues/new">tell us how we can improve</a>.'

# Adds a reading time to the top of each doc.
[params.ui.readingtime]
enable = false

[params.links]
# End user relevant links. These will show up on left side of footer and in the community page if you have one.
[[params.links.user]]
  name = "GitHub Discussions"
  url = "https://github.com/crossplane-contrib/function-hcl/discussions"
  icon = "fab fa-github"
  desc = "Ask questions and discuss function-hcl"
[[params.links.user]]
  name = "Crossplane Slack"
  url = "https://slack.crossplane.io"
  icon = "fab fa-slack"
  desc = "Chat with the Crossplane community"

# Developer relevant links. These will show up on right side of footer and in the community page if you have one.
[[params.links.developer]]
  name = "GitHub"
  url = "https://github.com/crossplane-contrib/function-hcl"
  icon = "fab fa-github"
  desc = "Development takes place here!"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false
  style = "monokai"

[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.110.0"
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
    disable = false
